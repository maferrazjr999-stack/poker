<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#112d1c"/>
  <!-- Gold border -->
  <rect x="12" y="12" width="488" height="488" rx="82" fill="none" stroke="#c9a84c" stroke-width="10"/>
  <!-- Inner felt texture suggestion -->
  <rect x="30" y="30" width="452" height="452" rx="68" fill="#1a4a2e"/>

  <!-- Central large spade -->
  <path d="
    M256 100
    C256 100 130 195 130 278
    C130 325 168 345 206 332
    C188 365 170 390 136 408
    L376 408
    C342 390 324 365 306 332
    C344 345 382 325 382 278
    C382 195 256 100 256 100 Z
  " fill="#c9a84c"/>

  <!-- Corner suit symbols -->
  <text x="58"  y="100" font-family="Georgia,serif" font-size="56" fill="#e8c96a" text-anchor="middle" opacity="0.9">♠</text>
  <text x="454" y="100" font-family="Georgia,serif" font-size="56" fill="#e03535" text-anchor="middle" opacity="0.9">♥</text>
  <text x="58"  y="480" font-family="Georgia,serif" font-size="56" fill="#e8c96a" text-anchor="middle" opacity="0.9">♣</text>
  <text x="454" y="480" font-family="Georgia,serif" font-size="56" fill="#e03535" text-anchor="middle" opacity="0.9">♦</text>

  <!-- Bottom label -->
  <text x="256" y="478" font-family="Georgia,serif" font-size="44" font-weight="bold"
        fill="#c9a84c" text-anchor="middle" letter-spacing="4">POKER</text>
</svg>
